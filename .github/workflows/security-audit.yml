name: Gatekeeper Security Audit

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [master, main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone and Install Gatekeeper
        run: |
          git clone https://github.com/AAAjczz/gatekeeper.git /tmp/gatekeeper
          pip install /tmp/gatekeeper

      - name: Run Audit
        continue-on-error: true
        run: python -m gatekeeper.cli audit -d . -f sarif -o .

      - name: Rename SARIF to fixed name
        if: always()
        run: |
          SARIF=$(ls gatekeeper_*.sarif 2>/dev/null | head -1)
          if [ -n "$SARIF" ]; then
            mv "$SARIF" gatekeeper-results.sarif
            echo "Renamed $SARIF -> gatekeeper-results.sarif"
          else
            echo "No SARIF file found"
          fi

      - name: Upload to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gatekeeper-results.sarif
