name: Gatekeeper Security Audit

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [master, main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for SARIF upload
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Gatekeeper
        run: pip install git+https://github.com/AAAjczz/gatekeeper.git

      - name: Run Audit
        # Gatekeeper exits 1 when vulnerabilities found — that's the signal,
        # not a CI failure. Continue regardless so SARIF uploads.
        continue-on-error: true
        run: gatekeeper audit -d . -f sarif

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/gatekeeper_*.sarif
