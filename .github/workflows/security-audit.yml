name: Gatekeeper Security Audit

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [master, main]
  schedule:
    - cron: "0 8 * * 1"  # every Monday 8am UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Gatekeeper
        run: pip install git+https://github.com/AAAjczz/gatekeeper.git

      - name: Run Audit
        run: gatekeeper audit -d . -f sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/gatekeeper_*.sarif
