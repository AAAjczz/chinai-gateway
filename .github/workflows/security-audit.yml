name: Gatekeeper Security Audit

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [master, main]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone and Install Gatekeeper
        run: |
          git clone https://github.com/AAAjczz/gatekeeper.git /tmp/gatekeeper
          pip install /tmp/gatekeeper

      - name: Run Audit
        continue-on-error: true
        run: python -m gatekeeper.cli audit -d . -f sarif

      - name: Debug — show what was generated
        if: always()
        run: |
          echo "=== reports/ ==="
          ls -la reports/ 2>/dev/null || echo "(no reports/ directory)"
          echo "=== pwd ==="
          pwd
          echo "=== gatekeeper version ==="
          python -c "from gatekeeper import __version__; print(__version__)"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/gatekeeper_*.sarif
