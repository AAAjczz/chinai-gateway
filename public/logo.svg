<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1e"/>
      <stop offset="100%" style="stop-color:#06060d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c7cff"/>
      <stop offset="100%" style="stop-color:#7c5cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="48" fill="url(#bg)"/>
  <rect width="240" height="240" rx="48" fill="none" stroke="rgba(92,124,255,0.2)" stroke-width="1.5"/>

  <!-- Gateway arch -->
  <path d="M60 170 L60 100 Q60 55 120 55 Q180 55 180 100 L180 170"
        fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>

  <!-- Horizontal connector lines — left -->
  <line x1="40" y1="90" x2="70" y2="90" stroke="rgba(92,124,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <line x1="35" y1="120" x2="70" y2="120" stroke="rgba(124,92,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  <line x1="45" y1="150" x2="70" y2="150" stroke="rgba(92,124,255,0.3)" stroke-width="3" stroke-linecap="round"/>

  <!-- Horizontal connector lines — right -->
  <line x1="170" y1="90" x2="200" y2="90" stroke="rgba(92,124,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="120" x2="205" y2="120" stroke="rgba(124,92,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="150" x2="195" y2="150" stroke="rgba(92,124,255,0.3)" stroke-width="3" stroke-linecap="round"/>

  <!-- Input dots -->
  <circle cx="40" cy="90" r="4" fill="#5c7cff" opacity="0.6"/>
  <circle cx="35" cy="120" r="4" fill="#7c5cff" opacity="0.5"/>
  <circle cx="45" cy="150" r="4" fill="#5c7cff" opacity="0.4"/>

  <!-- Output dots -->
  <circle cx="200" cy="90" r="4" fill="#5c7cff" opacity="0.6"/>
  <circle cx="205" cy="120" r="4" fill="#7c5cff" opacity="0.5"/>
  <circle cx="195" cy="150" r="4" fill="#5c7cff" opacity="0.4"/>

  <!-- Center hub -->
  <circle cx="120" cy="130" r="14" fill="url(#accent)" opacity="0.9"/>
  <circle cx="120" cy="130" r="6" fill="#f0f0f8"/>

  <!-- Data flow ring -->
  <circle cx="120" cy="130" r="22" fill="none" stroke="rgba(92,124,255,0.3)" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- CG lettering below arch -->
  <text x="120" y="185" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="700" fill="#f0f0f8" letter-spacing="4">CHINAI</text>
  <text x="120" y="205" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="400" fill="#8888a8" letter-spacing="6">GATEWAY</text>
</svg>
