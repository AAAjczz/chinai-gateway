# ============================================================
# Chinai Gateway — Self-hosted AI API Gateway
#
# Deploy on YOUR server. Use YOUR API keys.
# We don't run a hosted service. You own your data.
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: chinai-db
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: "${DB_PASSWORD:?err: DB_PASSWORD must be set in .env}"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    # Pre-configured Chinai Gateway image (5 Chinese AI providers, 14 models)
    # Falls back to building locally if the image isn't available
    image: ghcr.io/aaajczz/chinai-gateway:latest
    build: .
    container_name: chinai-gateway
    restart: unless-stopped
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      # Bind 127.0.0.1 — never expose LiteLLM directly to the internet.
      # Put nginx/Caddy in front with TLS. See docs/hardening.md
      - "127.0.0.1:${LITELLM_PORT:-4000}:4000"
    environment:
      DATABASE_URL: "postgresql://litellm:${DB_PASSWORD:?err: DB_PASSWORD must be set in .env}@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:?err: LITELLM_MASTER_KEY must be set in .env}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY:?err: LITELLM_SALT_KEY must be set in .env}"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      BAIDU_API_KEY: ${BAIDU_API_KEY:-}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-}
    volumes:
      - ./config.yaml:/app/config.yaml
    command: ["--config=/app/config.yaml"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; req=urllib.request.Request('http://localhost:4000/health/liveliness'); print(urllib.request.urlopen(req).read())\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
