# ============================================================
# Chinai Gateway — Self-hosted AI API Gateway
#
# Deploy on YOUR server. Use YOUR API keys.
# We don't run a hosted service. You own your data.
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: chinai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chinai-db-pass}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d litellm -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: chinai-gateway
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      DATABASE_URL: "postgresql://litellm:${DB_PASSWORD:-chinai-db-pass}@db:5432/litellm"
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-change-me}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-salt-change-me}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:-}
    volumes:
      - ./config.yaml:/app/config.yaml
    command: ["--config=/app/config.yaml"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; req=urllib.request.Request('http://localhost:4000/health/liveliness'); print(urllib.request.urlopen(req).read())\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
