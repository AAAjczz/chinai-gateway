# ============================================================
# chinai-gateway Nginx 反向代理 —— 安全加固
#
# 部署方式（VPS 上）：
#   1. cp nginx-chinai.conf /etc/nginx/sites-available/chinai
#   2. ln -s /etc/nginx/sites-available/chinai /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#
# 本地测试不需要这个——LiteLLM 绑定 127.0.0.1:4000 已经很安全
# ============================================================

server {
    listen 443 ssl http2;
    server_name api.your-domain.com;

    # ========== TLS 证书（Let's Encrypt） ==========
    ssl_certificate     /etc/letsencrypt/live/api.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.your-domain.com/privkey.pem;

    # ========== TLS 加固 ==========
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ========== 安全响应头 ==========
    # HSTS — 强制浏览器使用 HTTPS（1年有效期，含子域名）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 禁止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;

    # 禁止被嵌入 iframe（防点击劫持）
    add_header X-Frame-Options "DENY" always;

    # 控制 Referer 信息发送
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 内容安全策略（API 不需要加载外部资源）
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # 跨域嵌入/打开策略
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # 权限策略
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # 跨域策略文件
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ========== 隐藏服务端信息 ==========
    server_tokens off;
    more_clear_headers 'Server';
    more_clear_headers 'X-Powered-By';

    # ========== 请求体大小限制（防 DoS） ==========
    client_max_body_size 10m;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # ========== 速率限制 ==========
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req zone=api burst=50 nodelay;

    # ========== 反向代理到 LiteLLM ==========
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        # 缓冲
        proxy_buffering off;
    }

    # ========== 隐藏 Swagger 文档（即使 LiteLLM 关了也加一层保险） ==========
    location = / {
        return 404;
    }
    location = /docs {
        return 404;
    }
    location = /openapi.json {
        return 404;
    }
    location = /redoc {
        return 404;
    }

    # ========== /metrics 只允许内网访问 ==========
    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ========== /health 允许外部用于监控 ==========
    location = /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.your-domain.com;
    return 301 https://$host$request_uri;
}
