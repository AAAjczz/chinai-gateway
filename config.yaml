general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Rate limiting — defense-in-depth with Nginx layer on VPS
  rpm_limit: 500
  rpm_limit_per_key: 100
  # ========== 安全加固 ==========
  # 禁止公开列出所有模型及其详情
  disable_model_list_endpoint: true

model_list:
  # ============================================================
  # DeepSeek V4 — 2026.04 发布，1M 上下文，Agent 能力开源最强
  # deepseek-chat / deepseek-reasoner 将于 2026.07 下线
  # ============================================================
  - model_name: deepseek-v4-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      mode: chat
      max_tokens: 384000
      supports_function_calling: true
      supports_vision: false
      description: "DeepSeek-V4-Pro (1.6T MoE, 49B active) — flagship, near Opus 4.6 agent performance"

  - model_name: deepseek-v4-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      mode: chat
      max_tokens: 384000
      supports_function_calling: true
      supports_vision: false
      description: "DeepSeek-V4-Flash (284B, 13B active) — lightweight, best price/performance"

  # Legacy (deprecated after 2026-07-24, kept for compatibility)
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      mode: chat
      max_tokens: 65536
      supports_function_calling: true
      supports_vision: false
      description: "[LEGACY] DeepSeek-V3 — will be deprecated, use deepseek-v4-pro instead"

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      mode: chat
      max_tokens: 65536
      supports_function_calling: false
      supports_vision: false
      description: "[LEGACY] DeepSeek-R1 — will be deprecated, use deepseek-v4-pro with thinking mode instead"

  # ============================================================
  # Qwen 系列 (阿里百炼) — 中文理解最强
  # ¥2/百万token (输入), ¥6/百万token (输出)
  # ============================================================
  - model_name: qwen-plus
    litellm_params:
      model: openai/qwen-plus
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/QWEN_API_KEY
    model_info:
      mode: chat
      max_tokens: 131072
      supports_function_calling: true
      supports_vision: false
      description: "Qwen-Plus — strong Chinese understanding, 128K context"

  - model_name: qwen-max
    litellm_params:
      model: openai/qwen-max
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/QWEN_API_KEY
    model_info:
      mode: chat
      max_tokens: 32768
      supports_function_calling: true
      supports_vision: false
      description: "Qwen-Max — flagship model, best Chinese performance"

  - model_name: qwen-vl-plus
    litellm_params:
      model: openai/qwen-vl-plus
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/QWEN_API_KEY
    model_info:
      mode: chat
      max_tokens: 32768
      supports_function_calling: false
      supports_vision: true
      description: "Qwen-VL-Plus — vision-language model, image understanding"

  # ============================================================
  # 智谱 GLM 系列 — Function Calling 最稳
  # ¥1/百万token (输入), ¥4/百万token (输出)
  # ============================================================
  - model_name: glm-4-plus
    litellm_params:
      model: openai/glm-4-plus
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: os.environ/ZHIPU_API_KEY
    model_info:
      mode: chat
      max_tokens: 131072
      supports_function_calling: true
      supports_vision: false
      description: "GLM-4-Plus — Zhipu flagship, best tool-use/function calling"

  - model_name: glm-4-flash
    litellm_params:
      model: openai/glm-4-flash
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: os.environ/ZHIPU_API_KEY
    model_info:
      mode: chat
      max_tokens: 131072
      supports_function_calling: true
      supports_vision: false
      description: "GLM-4-Flash — fastest/cheapest GLM, free tier available"

  - model_name: glm-4v-plus
    litellm_params:
      model: openai/glm-4v-plus
      api_base: https://open.bigmodel.cn/api/paas/v4
      api_key: os.environ/ZHIPU_API_KEY
    model_info:
      mode: chat
      max_tokens: 16384
      supports_function_calling: true
      supports_vision: true
      description: "GLM-4V-Plus — Zhipu vision model, best Chinese OCR"

  # ============================================================
  # Kimi / 月之暗面 — 超长上下文
  # ¥12/百万token (输入), ¥12/百万token (输出)
  # ============================================================
  - model_name: kimi
    litellm_params:
      model: openai/moonshot-v1-8k
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
    model_info:
      mode: chat
      max_tokens: 8192
      supports_function_calling: true
      supports_vision: false
      description: "Kimi Moonshot v1 — strong long-context performance, file reading"

  - model_name: kimi-128k
    litellm_params:
      model: openai/moonshot-v1-128k
      api_base: https://api.moonshot.cn/v1
      api_key: os.environ/MOONSHOT_API_KEY
    model_info:
      mode: chat
      max_tokens: 131072
      supports_function_calling: true
      supports_vision: false
      description: "Kimi Moonshot v1 128K — ultra-long context, document analysis"

  # ============================================================
  # ERNIE / 百度文心 — 搜索增强、企业生态
  # ERNIE-Speed 有免费额度
  # ============================================================
  - model_name: ernie-4.0-turbo
    litellm_params:
      model: openai/ernie-4.0-turbo-8k
      api_base: https://qianfan.baidubce.com/v2
      api_key: os.environ/BAIDU_API_KEY
    model_info:
      mode: chat
      max_tokens: 8192
      supports_function_calling: true
      supports_vision: false
      description: "ERNIE-4.0-Turbo — Baidu flagship, search-enhanced, strong Chinese"

  - model_name: ernie-speed
    litellm_params:
      model: openai/ernie-speed-128k
      api_base: https://qianfan.baidubce.com/v2
      api_key: os.environ/BAIDU_API_KEY
    model_info:
      mode: chat
      max_tokens: 131072
      supports_function_calling: true
      supports_vision: false
      description: "ERNIE-Speed — Baidu lightweight, free tier, 128K context"

litellm_settings:
  set_verbose: false
  drop_params: true
  request_timeout: 120
  # ========== 安全加固 ==========
  # /metrics 端点必须认证（禁止无认证访问）
  require_auth_for_metrics_endpoint: true
  # 隐藏错误信息中的配置细节
  redact_user_api_key_info: true
  # 禁止在响应中披露 provider 详情
  hide_model_details: true

router_settings:
  enable_fallbacks: true
  allowed_fails: 3
  num_retries: 2
  cooldown_time: 30
